<section class="pt-12">
  <div
    class="h-[calc(100dvh-3rem)] w-full flex justify-center items-center flex-col"
  >
    <div
      class="title relative mb-7 text-white text-3xl font-semibold pb-2 lg:mb-10 before:content-[''] before:absolute before:h-1 before:w-full before:bg-red-400 before:left-0 before:bottom-0"
    >
      <span
        class="relative text-white text-3xl font-semibold pb-2 sm:text-4xl md:text-5xl lg:text-3xl xl:text-4xl after:content-[''] after:absolute after:h-[2px] after:w-[80%] after:bg-red-400 after:left-1/2 after:-bottom-1 after:-translate-x-1/2"
        >My Skills</span
      >
    </div>

    <!-- contenedor principal -->
    <div class="w-full grid lg:grid-cols-2 lg:gap-x-20">
      <div>
        <div>
          <h2
            class="text-white text-2xl font-medium mb-2 sm:text-3xl md:text-5xl md:mb-9 lg:text-3xl lg:my-2 xl:text-[28px] xl:mb-4"
          >
            Skills Reflects Our Knowledge
          </h2>
          <p
            class="text-base mb-2 sm:mb-4 sm:text-xl md:text-[28px] md:mb-8 lg:text-lg xl:text-xl"
          >
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Soluta,
            dignissimos. Modi unde vel architecto sint, molestias quam nisi
            illum
          </p>
        </div>

        <div class="flex items-center gap-x-2 mb-2 font-bold sm:mb-4 md:mb-8">
          <span class="text-5xl sm:text-6xl md:text-7xl">10</span>
          <p class="w-20 text-sm sm:text-xl md:text-3xl md:w-40">
            Years Of Experience
          </p>
        </div>
      </div>

      <!-- skills -->
      <div class="grid grid-cols-2 gap-y-4">
        <div *ngFor="let item of skills" class="flex flex-col items-center">
          <h3 class="text-lg font-semibold sm:text-xl md:text-3xl">
            {{ item.name }}
          </h3>
          <p class="text-2xl font-bold sm:text-3xl md:text-4xl">
            {{ item.porcentaje }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
