        >My Skills</span

    <!-- contenedor principal -->

      <!-- skills -->
<div class=" grid grid-cols-2 gap-y-2 gap-x-2">
  <div *ngFor="let item of skills" class="flex flex-col items-start w-full bg-white/5 p-3 rounded-xl border border-white/10">

    <div class="flex justify-between flex-col  items-center w-full mb-2">
      <h3 class="text-sm font-semibold sm:text-base md:text-lg text-gray-200">
        {{ item.name }}
      </h3>
      <span class="text-[10px] sm:text-xs text-gray-400 font-medium uppercase tracking-wider">
        {{ item.level === 1 ? 'Básico' : (item.level === 2 ? 'Medio' : 'Avanzado') }}
      </span>
    </div>

    <div class="flex gap-x-1 w-full h-1.5 sm:h-2">
      <div class="h-full flex-1 rounded-full bg-red-400 shadow-[0_0_8px_rgba(248,113,113,0.6)]"></div>

      <div class="h-full flex-1 rounded-full transition-colors duration-300"
           [ngClass]="item.level >= 2 ? 'bg-red-400 shadow-[0_0_8px_rgba(248,113,113,0.6)]' : 'bg-white/10'"></div>

      <div class="h-full flex-1 rounded-full transition-colors duration-300"
           [ngClass]="item.level === 3 ? 'bg-red-400 shadow-[0_0_8px_rgba(248,113,113,0.6)]' : 'bg-white/10'"></div>
    </div>

  </div>
</div>

    </div>
  </div>
</section>
